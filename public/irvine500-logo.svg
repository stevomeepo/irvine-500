<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" role="img" aria-labelledby="title desc">
  <title id="title">Irvine500 logo</title>
  <desc id="desc">A four-tile Irvine500 mark next to the Irvine500 wordmark.</desc>
  <g transform="translate(24 24)">
    <rect x="0" y="0" width="96" height="96" fill="#ffffff" stroke="#000000" stroke-width="6"/>
    <rect x="96" y="0" width="96" height="96" fill="#45d24d" stroke="#000000" stroke-width="6"/>
    <rect x="0" y="96" width="96" height="96" fill="#f2ea25" stroke="#000000" stroke-width="6"/>
    <rect x="96" y="96" width="96" height="96" fill="#ff3148" stroke="#000000" stroke-width="6"/>
    <text x="48" y="69" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" fill="#000000">I</text>
    <text x="144" y="69" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" fill="#000000">5</text>
    <text x="48" y="165" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" fill="#000000">0</text>
    <text x="144" y="165" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" fill="#000000">0</text>
  </g>
  <text x="256" y="153" font-family="Arial Black, Arial, sans-serif" font-size="86" font-weight="900" letter-spacing="2" fill="#d8d8da">IRVINE500</text>
</svg>
